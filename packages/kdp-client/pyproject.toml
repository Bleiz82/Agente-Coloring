[project]
name = "colorforge-kdp-client"
version = "0.1.0"
description = "ColorForge AI KDP automation client -- Playwright-based"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.48.0",
    "playwright-stealth>=1.0.6",
    "prisma>=0.15.0",
    "rq>=1.16.0",
    "redis>=5.0.0",
    "cryptography>=42.0.0",
    "aiohttp>=3.9.0",
    "loguru>=0.7.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "mypy>=1.10.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["colorforge_kdp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
python_version = "3.12"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
